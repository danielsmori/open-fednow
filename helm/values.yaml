# Default values for openfednow — production-oriented.
# Override with values-staging.yaml for staging deployments.

# ── Image ──────────────────────────────────────────────────────────────────
image:
  repository: ghcr.io/danielsmori/open-fednow
  tag: "0.1.0"
  pullPolicy: IfNotPresent

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

# ── Replicas / Autoscaling ─────────────────────────────────────────────────
replicaCount: 2

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70

# Minimum available pods during voluntary disruptions (node drains, upgrades).
podDisruptionBudget:
  minAvailable: 1

# ── Service Account ────────────────────────────────────────────────────────
serviceAccount:
  create: true
  annotations: {}
  # Leave blank to default to the chart fullname.
  name: ""

# ── Spring profile ─────────────────────────────────────────────────────────
spring:
  profiles:
    active: prod

# ── Application config (non-sensitive) ─────────────────────────────────────
openfednow:
  # Core banking adapter: fiserv | fis | jackhenry  (never sandbox in prod)
  adapter: fiserv
  gateway:
    fednowEndpoint: "https://connect.fednow.org"
    rtpEndpoint: ""    # Set when TCH RTP onboarding is live; empty = sandbox client
    responseTimeoutSeconds: 18

  # Per-client rate limiting on /fednow/** and /rtp/** POST endpoints. 429 +
  # Retry-After on excess. See ADR / docs for behavior.
  rateLimit:
    transfersPerSecond: 100

  # Saga timeout monitor. Sweeps non-terminal sagas older than the threshold
  # and compensates with ISO 20022 XPIR.
  saga:
    timeoutSeconds: 30
    timeoutCheckIntervalSeconds: 10

  # Idempotency retention for duplicate pacs.008 detection. FedNow's documented
  # retry window is 24h; the default 48h doubles it for clock-skew slack.
  idempotency:
    ttlHours: 48
    cleanupIntervalMinutes: 60

  # Reconciliation pagination. Accounts with unconfirmed entries are scanned
  # in keyset-paginated batches so memory stays flat regardless of institution
  # scale (see #51).
  reconciliation:
    batchSize: 500

  # Shadow Ledger balance seeding on startup. Comma-separated account IDs.
  # Empty by default; opt in once the operations team has confirmed which
  # accounts must be hydrated from the core on a fresh deployment.
  shadowLedger:
    seedAccounts: ""

  # Fraud pre-screening. Disabled by default — institutions are expected to
  # plug in their own FraudScreeningPort for production. When enabled, the
  # rule-based default service applies amount cap + debtor velocity + denylist.
  fraud:
    enabled: false
    maxSingleTransferAmount: "25000.00"
    velocity:
      maxPerWindow: 10
      windowSeconds: 60
    accountDenylist: ""    # Comma-separated account IDs
    # Hard timeout on the fraud-screening call. A production scoring service
    # that hangs must not block the payment thread past the FedNow SLA window.
    screeningTimeoutMillis: 1500

  # Admin audit log retention (audit #15) — sweeps admin_audit_log on the
  # configured cadence. Default 365 days retention.
  adminAudit:
    retentionDays: 365
    cleanupIntervalHours: 24

  # Compensation retry sweep (audit #24) — retries Shadow Ledger reversals
  # that failed inside saga compensation. Idempotent under retry.
  compensationRetry:
    intervalSeconds: 300
    batchSize: 200

  # FedNow JWS message signing (ADR-0009). Opt-in — enable in production
  # once Fed PKI keystore is provisioned in the openfednow-tls Secret and the
  # signing truststore Secret is mounted.
  fednow:
    signing:
      enabled: false
      keyAlias: ""       # first key entry used when blank
      keyId: ""          # SHA-256 thumbprint used when blank
      truststorePath: "" # required for inbound verification in prod

# ── HikariCP database connection pool ─────────────────────────────────────
# Defaults are sized for moderate FedNow throughput. Tune to observed
# utilization once you have production traffic.
hikari:
  maxPoolSize: 50
  minIdle: 10
  connectionTimeoutMs: 5000
  idleTimeoutMs: 300000
  maxLifetimeMs: 1500000
  validationTimeoutMs: 5000

redis:
  host: redis-master
  port: 6379

rabbitmq:
  host: rabbitmq
  port: 5672

database:
  # Full JDBC URL — override for your PostgreSQL service name and database.
  url: "jdbc:postgresql://postgresql:5432/openfednow"

# ── Credentials (pre-existing Secrets) ────────────────────────────────────
# The chart does NOT create these Secrets. Provision them before installing:
#
#   kubectl create secret generic openfednow-db \
#     --from-literal=DB_USERNAME=app \
#     --from-literal=DB_PASSWORD=<password>
#
#   kubectl create secret generic openfednow-rabbitmq \
#     --from-literal=RABBITMQ_USER=openfednow \
#     --from-literal=RABBITMQ_PASS=<password>
#
#   kubectl create secret generic openfednow-tls \
#     --from-literal=TLS_KEYSTORE_PASSWORD=<password> \
#     --from-file=keystore.p12=/path/to/institution-keystore.p12 \
#     --from-file=fed-truststore.jks=/path/to/fed-truststore.jks
existingSecrets:
  database: openfednow-db
  rabbitmq: openfednow-rabbitmq
  tls: openfednow-tls

# ── TLS keystore volume ────────────────────────────────────────────────────
# Keystore files are sourced from existingSecrets.tls and mounted read-only.
tls:
  mountPath: /etc/openfednow/tls
  # Key names inside the Secret that contain the binary keystore files.
  keystoreFilename: keystore.p12
  fedTruststoreFilename: fed-truststore.jks

# ── Service ────────────────────────────────────────────────────────────────
service:
  type: ClusterIP
  port: 8080

# ── Ingress ────────────────────────────────────────────────────────────────
# Disabled by default — the FedNow gateway is typically not internet-facing;
# FedNow connections are initiated from the cluster outbound (mTLS to the Fed).
# Enable if your institution routes inbound FedNow messages via an ingress.
ingress:
  enabled: false
  className: ""
  annotations: {}
    # nginx.ingress.kubernetes.io/ssl-passthrough: "true"
  host: openfednow.example.com
  tls: []

# ── Resources ─────────────────────────────────────────────────────────────
# Sized for a Spring Boot payment service under moderate FedNow load.
# Review and adjust for your cluster's capacity and observed utilization.
resources:
  requests:
    cpu: 500m
    memory: 512Mi
  limits:
    cpu: 2000m
    memory: 1Gi

# ── Scheduling ────────────────────────────────────────────────────────────
nodeSelector: {}

tolerations: []

# Prefer spreading pods across nodes for high availability.
# Override with an empty {} to disable.
affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchExpressions:
              - key: app.kubernetes.io/name
                operator: In
                values:
                  - openfednow
          topologyKey: kubernetes.io/hostname
