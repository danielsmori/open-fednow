spring:
  application:
    name: openfednow

  # Graceful shutdown: on SIGTERM, refuse new requests and let in-flight
  # ones complete before the JVM exits. Critical for payments — a half-
  # processed pacs.008 cut at TCP close would leave a saga at FUNDS_RESERVED
  # with no acknowledgement to the originator. The phase timeout caps the
  # drain at 30s; Kubernetes' preStop + terminationGracePeriodSeconds must
  # exceed this so the pod isn't SIGKILL'd before drain completes.
  lifecycle:
    timeout-per-shutdown-phase: 30s

server:
  # GRACEFUL is the trigger for spring.lifecycle.timeout-per-shutdown-phase.
  # IMMEDIATE (the default) would close the listener and cut every in-flight
  # request — unsafe for payments.
  shutdown: graceful

  # Shadow Ledger — Redis configuration
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  # RabbitMQ — async message queue for maintenance window bridge
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER:guest}
    password: ${RABBITMQ_PASS:guest}

  # Kafka — optional event streaming bus (coexists with RabbitMQ).
  # Only active when openfednow.kafka.enabled=true. When disabled, NoOpPaymentEventPublisher
  # handles all event publishing silently — no broker connection is made.
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      # Require acks from all in-sync replicas before confirming (safe default for payments)
      acks: all
      # Retry up to 3 times on transient send errors (events are fire-and-forget but
      # at-least-once delivery is preferred when Kafka is healthy)
      retries: 3

  # Datasource — PostgreSQL in production; H2 (PostgreSQL-compatible mode) for local dev
  datasource:
    url: ${DB_URL:jdbc:h2:mem:openfednow;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1}
    username: ${DB_USERNAME:sa}
    password: ${DB_PASSWORD:}

  # Flyway — schema migration management
  flyway:
    enabled: true
    locations: classpath:db/migration

  # JPA — schema is managed by Flyway; Hibernate must not alter tables
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false

openfednow:
  # Admin endpoint credentials (reference implementation — integrate with institution IAM in production).
  # For rotation without a restart, set credential-file to a two-line file whose
  # first line is the username and second line is the password. The file is
  # re-read on every login (mtime-cached), so a K8s Secret mount at that path
  # can be updated in place without redeploying.
  admin:
    username: ${ADMIN_USERNAME:admin}
    password: ${ADMIN_PASSWORD:changeme}
    credential-file: ${ADMIN_CREDENTIAL_FILE:}

  # Kafka event bus — optional, coexists with the RabbitMQ maintenance-window queue.
  # Set KAFKA_ENABLED=true and KAFKA_BOOTSTRAP_SERVERS=<host:port> to activate.
  # Failed publishes are re-routed to a dead-letter topic (default: <topic>.dlq)
  # with X-DLQ-Original-Topic + X-DLQ-Reason headers naming the failure.
  kafka:
    enabled: ${KAFKA_ENABLED:false}
    topic: ${KAFKA_TOPIC:openfednow.payment.events}
    dlq-topic: ${KAFKA_DLQ_TOPIC:}   # blank = derive from topic + ".dlq"

  # Idempotency record retention. FedNow's documented retry window for duplicate
  # pacs.008 messages is 24 hours; the default 48-hour TTL doubles that window
  # to absorb clock skew and late retries. The same TTL is applied to the Redis
  # cache entry and to the PostgreSQL expires_at column. IdempotencyCleanupService
  # sweeps expired Postgres rows on the configured interval (Redis expires natively).
  idempotency:
    ttl-hours: ${IDEMPOTENCY_TTL_HOURS:48}
    cleanup-interval-minutes: ${IDEMPOTENCY_CLEANUP_INTERVAL_MINUTES:60}

  # Core banking adapter to use: sandbox | fiserv | fis | jackhenry
  # Default is 'sandbox' for local development. Set CORE_ADAPTER=fiserv (etc.)
  # to target a real vendor integration.
  adapter: ${CORE_ADAPTER:sandbox}

  # Sandbox adapter — local development simulation of a core banking system.
  # Only active when openfednow.adapter=sandbox.
  sandbox:
    # Toggle isCoreSystemAvailable(). Set to false to exercise the Shadow
    # Ledger maintenance-window and RabbitMQ queueing paths.
    core-available: ${SANDBOX_CORE_AVAILABLE:true}
    # Balance returned by getAvailableBalance() for non-LOWBAL_ accounts.
    default-balance: ${SANDBOX_DEFAULT_BALANCE:50000.00}
    # Artificial per-call delay in milliseconds (0 = disabled).
    # Useful for stress-testing the 20-second FedNow SLA locally.
    simulate-latency-ms: ${SANDBOX_LATENCY_MS:0}

  # Fiserv Communicator Open adapter — only active when openfednow.adapter=fiserv.
  # Credentials are issued by Fiserv and require a signed integration agreement.
  # Set FISERV_BASE_URL to the Fiserv Communicator Open base URL for your environment.
  adapter-fiserv:
    base-url: ${FISERV_BASE_URL:}
    client-id: ${FISERV_CLIENT_ID:}
    client-secret: ${FISERV_CLIENT_SECRET:}
    api-key: ${FISERV_API_KEY:}
    token-path: ${FISERV_TOKEN_PATH:/fts-apim/oauth2/v2}
    token-expiry-buffer-seconds: ${FISERV_TOKEN_BUFFER_SECONDS:60}

  # FIS Code Connect adapter — only active when openfednow.adapter=fis.
  # Credentials (consumer key and secret) are issued by the FIS Code Connect
  # portal (codeconnect.fisglobal.com). The institution ID (feId) is the
  # FIS-assigned identifier for the financial institution.
  adapter-fis:
    base-url: ${FIS_BASE_URL:}
    consumer-key: ${FIS_CONSUMER_KEY:}
    consumer-secret: ${FIS_CONSUMER_SECRET:}
    institution-id: ${FIS_INSTITUTION_ID:}
    token-path: ${FIS_TOKEN_PATH:/oauth2/v1/token}
    token-expiry-buffer-seconds: ${FIS_TOKEN_BUFFER_SECONDS:60}

  # Jack Henry jXchange adapter — only active when openfednow.adapter=jackhenry.
  # Credentials (client ID and secret) are issued by Jack Henry after completing
  # the OAuth 2.0 migration process (vendorqa@jackhenry.com). The institution
  # routing ID is the 9-digit ABA routing number used as InstRtId in jXchangeHdr.
  # Base URL is the jXchange Service Gateway endpoint for the institution's
  # environment (e.g. https://jx.jackhenry.com or the institution-specific DMZ URL).
  adapter-jackhenry:
    base-url: ${JH_BASE_URL:}
    client-id: ${JH_CLIENT_ID:}
    client-secret: ${JH_CLIENT_SECRET:}
    institution-routing-id: ${JH_ROUTING_ID:}
    token-path: ${JH_TOKEN_PATH:/oauth2/token}
    token-expiry-buffer-seconds: ${JH_TOKEN_BUFFER_SECONDS:60}

  # FedNow / RTP gateway settings
  # fednow-endpoint is intentionally absent by default so that SandboxFedNowClient
  # activates for local development. Set FEDNOW_ENDPOINT to enable HttpFedNowClient.
  # rtp-endpoint is likewise intentionally absent by default so that SandboxRtpClient
  # activates for local development. Set RTP_ENDPOINT to enable HttpRtpClient.
  # Live connectivity for both rails requires institution-provided PKI credentials.
  gateway:
    response-timeout-seconds: 18   # must be < FedNow's / TCH's 20-second window

  # Per-client rate limiting on the FedNow / RTP transfer endpoints. Each
  # client identity (X-Forwarded-For first hop, else remote address) gets its
  # own one-second bucket of permits; requests beyond the bucket get 429 plus
  # Retry-After: 1. Set to a high value or disable at the Ingress layer if your
  # load-test traffic should not be throttled.
  rate-limit:
    transfers-per-second: ${RATE_LIMIT_TRANSFERS_PER_SECOND:100}

  # Fraud pre-screening. Default-disabled so a fresh sandbox runs unscreened.
  # When openfednow.fraud.enabled=true the DefaultFraudScreeningService applies:
  #   1. Account denylist (creditor or debtor present) → BLOCK
  #   2. Amount above max-single-transfer-amount → BLOCK
  #   3. Debtor velocity above max-per-window / window-seconds → BLOCK
  #   4. Amount at or above 50% of the cap → REVIEW (proceed but flag)
  # Production institutions are expected to provide their own FraudScreeningPort
  # implementation that calls into a scoring service or rules engine — the
  # NoOpFraudScreeningService falls back automatically when no other bean is registered.
  fraud:
    enabled: ${FRAUD_ENABLED:false}
    max-single-transfer-amount: ${FRAUD_MAX_AMOUNT:25000.00}
    velocity:
      max-per-window: ${FRAUD_VELOCITY_MAX:10}
      window-seconds: ${FRAUD_VELOCITY_WINDOW_SECONDS:60}
    # Comma-separated list of account IDs (debtor OR creditor) to block outright.
    # Empty by default.
    account-denylist: ${FRAUD_ACCOUNT_DENYLIST:}
    # Hard ceiling on how long MessageRouter waits for FraudScreeningPort.screen()
    # to return. A production implementation calling out to a hosted scoring
    # service must not block the payment thread past the FedNow 20s SLA window
    # if that service stalls. On timeout the framework fails open (PASS) and logs;
    # the screening service's own alerting catches its unavailability.
    screening-timeout-millis: ${FRAUD_SCREENING_TIMEOUT_MS:1500}

  # Admin audit log retention (audit #15). Default 365 days — long enough for
  # typical compliance review windows. The sweep runs daily.
  admin-audit:
    retention-days: ${ADMIN_AUDIT_RETENTION_DAYS:365}
    cleanup-interval-hours: ${ADMIN_AUDIT_CLEANUP_INTERVAL_HOURS:24}

  # Compensation retry sweep (audit #24). When a saga reaches FAILED but the
  # Shadow Ledger reversal failed (Redis blip, etc.), the underlying balance
  # stays out of sync. This @Scheduled sweep finds those orphaned reversals
  # and retries them. Idempotent — the reversal methods skip on existing
  # REVERSAL rows, so a retry is cheap and safe.
  compensation-retry:
    interval-seconds: ${COMPENSATION_RETRY_INTERVAL_SECONDS:300}
    batch-size: ${COMPENSATION_RETRY_BATCH_SIZE:200}

  # Payment saga settings
  saga:
    # Sagas in a forward-progress state (INITIATED, FUNDS_RESERVED, CORE_SUBMITTED)
    # for longer than this window are treated as stuck and compensated
    # automatically with ISO 20022 reason code XPIR (Expired).
    # Default 30s comfortably exceeds the 20s FedNow SLA window so a normally
    # completing saga is never mistaken for stuck.
    timeout-seconds: ${SAGA_TIMEOUT_SECONDS:30}
    # Frequency of the timeout sweep. Smaller values surface stuck sagas sooner
    # but increase database load; default 10s is a reasonable balance.
    timeout-check-interval-seconds: ${SAGA_TIMEOUT_CHECK_INTERVAL_SECONDS:10}

  # Reconciliation batch sizing. Each reconciliation cycle paginates through
  # accounts with unconfirmed entries in keyset-paginated batches, so memory
  # usage stays flat regardless of institution scale. Increase for higher
  # throughput on well-resourced JVMs; decrease for tighter heap budgets.
  reconciliation:
    batch-size: ${RECONCILIATION_BATCH_SIZE:500}

  # Shadow Ledger settings
  shadow-ledger:
    idempotency-ttl-hours: 48
    reconciliation-poll-interval-seconds: 30
    # Comma-separated account IDs to seed from the core banking system on
    # startup and via POST /admin/shadow-ledger/seed. Empty by default — a
    # fresh deployment performs no seeding until this is configured. Startup
    # seed uses SETNX semantics (never clobbers a live balance); the admin
    # endpoint overwrites unconditionally.
    seed-accounts: ${SHADOW_LEDGER_SEED_ACCOUNTS:}

  # TLS / Certificate settings
  # Fed PKI (FedNow rail) and TCH PKI (RTP rail) use separate certificate authorities.
  # Both follow the same lifecycle: skip in dev/sandbox (no truststore configured),
  # enforce via TLS termination layer (Kubernetes Ingress / Istio) in production.
  tls:
    keystore-path: ${TLS_KEYSTORE_PATH:}
    keystore-password: ${TLS_KEYSTORE_PASSWORD:}
    fed-truststore-path: ${FED_TRUSTSTORE_PATH:}
    tch-truststore-path: ${TCH_TRUSTSTORE_PATH:}
    tch-truststore-password: ${TCH_TRUSTSTORE_PASSWORD:}

  # FedNow JWS message signing (ADR-0009). Disabled by default so the sandbox
  # simulator setup keeps working unchanged. Enable in production; the private
  # key is loaded from openfednow.tls.keystore-path (same PKCS#12 keystore that
  # holds the mTLS keypair).
  fednow:
    signing:
      enabled: ${FEDNOW_SIGNING_ENABLED:false}
      # Alias of the RSA private-key entry to use. Optional — if unset the
      # first key entry in the keystore is used, which matches the typical
      # one-key-per-institution setup.
      key-alias: ${FEDNOW_SIGNING_KEY_ALIAS:}
      # JWS 'kid' header value. Optional — if unset a SHA-256 thumbprint of the
      # signing certificate is used, so both sides can derive it independently.
      key-id: ${FEDNOW_SIGNING_KEY_ID:}
      # Truststore containing the Fed's public signing certificate(s). Required
      # for inbound signature verification. Absent → filter is a no-op and the
      # Ingress-level mTLS remains the only inbound authentication.
      truststore-path: ${FEDNOW_SIGNING_TRUSTSTORE_PATH:}
      truststore-password: ${FEDNOW_SIGNING_TRUSTSTORE_PASSWORD:}

management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics
  endpoint:
    health:
      show-details: always
      # Show each named component (coreBanking, shadowLedger, db, redis, …)
      # at /actuator/health. Overridden to 'when-authorized' in prod profile.
      show-components: always
      # Explicitly enable liveness and readiness groups so that the Kubernetes
      # Deployment health probes work regardless of how the container runtime
      # sets KUBERNETES_SERVICE_HOST.
      probes:
        enabled: true

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha

# ── Resilience4j — circuit breakers for core banking adapter calls ─────────
#
# A single 'corebanking' circuit breaker instance protects all three
# adapter implementations (Fiserv, FIS, Jack Henry).  The Sandbox adapter
# is excluded — it runs in-process and never makes network calls.
#
# Rationale for the thresholds:
#   slidingWindowSize: 10        — recent call window; large enough to avoid
#                                  false trips from momentary spikes
#   failureRateThreshold: 50     — trip at 50% failures; aggressive for a
#                                  payment system where every failed call
#                                  risks a FedNow SLA breach
#   slowCallDurationThreshold    — 15 s matches the SyncAsyncBridge timeout;
#                                  calls that take this long are treated as
#                                  failures even if they eventually return
#   waitDurationInOpenState: 30s — allow the core system 30 seconds to
#                                  recover before retrying (half-open)
#   automaticTransition: true    — probe automatically after wait duration
#                                  so ops don't need to manually reset
#   registerHealthIndicator      — exposes coreBankingCircuitBreaker at
#                                  /actuator/health alongside the custom
#                                  coreBanking indicator
resilience4j:
  # ── Retry — outbound FedNow submission ───────────────────────────────────
  # Transient FedNow failures (network blips, 5xx) get a bounded number of
  # automatic retries before the framework returns a synthetic RJCT. 4xx
  # responses are NOT retried — a duplicate-detected pacs.008 or a malformed
  # message will not become well-formed by trying again. Idempotency is
  # guaranteed at the FedNow side via the message's EndToEndId.
  retry:
    instances:
      fednow:
        maxAttempts: 3
        waitDuration: 200ms
        # Exponential backoff with full jitter — the second retry waits
        # ~200ms * 2 = 400ms, the third ~800ms. The 18s response-timeout
        # window comfortably accommodates the full retry budget.
        enableExponentialBackoff: true
        exponentialBackoffMultiplier: 2
        enableRandomizedWait: true
        randomizedWaitFactor: 0.5
        retryExceptions:
          - org.springframework.web.client.ResourceAccessException
          - org.springframework.web.client.HttpServerErrorException
        ignoreExceptions:
          - org.springframework.web.client.HttpClientErrorException

  circuitbreaker:
    instances:
      corebanking:
        slidingWindowType: COUNT_BASED
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        failureRateThreshold: 50
        slowCallDurationThreshold: 15s
        slowCallRateThreshold: 50
        waitDurationInOpenState: 30s
        permittedNumberOfCallsInHalfOpenState: 3
        automaticTransitionFromOpenToHalfOpenEnabled: true
        registerHealthIndicator: true
