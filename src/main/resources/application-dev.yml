# OpenFedNow — Development profile
# Activate: SPRING_PROFILES_ACTIVE=dev  (or -Dspring.profiles.active=dev)
#
# Runs the full application on a developer workstation without any external
# services except Redis and RabbitMQ. Start those with:
#   docker run -d -p 6379:6379 redis:7-alpine
#   docker run -d -p 5672:5672 -p 15672:15672 rabbitmq:3-management
#
# The Sandbox adapter simulates the core banking system in-process, so no
# vendor (Fiserv, FIS, Jack Henry) access is required.
# Account-number prefixes control the response scenario — see SandboxAdapter.

openfednow:
  adapter: sandbox
  sandbox:
    # Set to false to exercise the Shadow Ledger maintenance-window path
    # (AvailabilityBridge queues payments to RabbitMQ instead of calling core).
    core-available: true
    default-balance: 50000.00
    # Uncomment to simulate a slow core and stress-test the 20-second FedNow SLA:
    # simulate-latency-ms: 5000

spring:
  datasource:
    url: jdbc:h2:mem:openfednow;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1
    username: sa
    password:
  jpa:
    # Show generated SQL in dev to catch unexpected queries during schema changes.
    # Disable if log output becomes too noisy.
    show-sql: true

management:
  endpoint:
    health:
      show-details: always

springdoc:
  swagger-ui:
    enabled: true
  api-docs:
    enabled: true
