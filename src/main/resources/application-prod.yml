# OpenFedNow — Production profile
# Activate: SPRING_PROFILES_ACTIVE=prod
#
# All infrastructure connection strings and credentials are REQUIRED environment
# variables with no fallback defaults. If any variable is absent the application
# will refuse to start — this is intentional to prevent silent misconfiguration
# in a regulated payment environment.
#
# Required environment variables:
#
#   Core adapter (must NOT be 'sandbox' in production):
#     CORE_ADAPTER          fiserv | fis | jackhenry
#
#   PostgreSQL (Shadow Ledger persistent store):
#     DB_URL                jdbc:postgresql://<host>:<port>/<database>
#     DB_USERNAME
#     DB_PASSWORD
#
#   Redis (Shadow Ledger real-time balance cache):
#     REDIS_HOST
#     REDIS_PORT
#
#   RabbitMQ (maintenance-window transaction queue):
#     RABBITMQ_HOST
#     RABBITMQ_PORT
#     RABBITMQ_USER
#     RABBITMQ_PASS
#
#   Federal Reserve PKI (mutual TLS with FedNow):
#     TLS_KEYSTORE_PATH     Path to institution PKCS#12 keystore
#     TLS_KEYSTORE_PASSWORD Keystore passphrase
#     FED_TRUSTSTORE_PATH   Path to Federal Reserve CA truststore

openfednow:
  # No default — application will not start if CORE_ADAPTER is unset.
  # The Sandbox adapter must never be used in production.
  adapter: ${CORE_ADAPTER}

  gateway:
    fednow-endpoint: ${FEDNOW_ENDPOINT:https://connect.fednow.org}
    response-timeout-seconds: 18

  tls:
    keystore-path: ${TLS_KEYSTORE_PATH}
    keystore-password: ${TLS_KEYSTORE_PASSWORD}
    fed-truststore-path: ${FED_TRUSTSTORE_PATH}

spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    # HikariCP sizing for prod traffic. Sized against the expected concurrent
    # saga count at peak FedNow throughput: ~30 in-flight sagas × ~3 DB
    # statements per saga step + headroom for the scheduled jobs (saga timeout
    # monitor, idempotency cleanup, reconciliation) gives a working set of
    # ~50 connections. Hikari's default of 10 would starve at less than 1/3
    # of peak load and force in-flight payments to wait on the pool.
    # See https://github.com/brettwooldridge/HikariCP/wiki/About-Pool-Sizing
    # for the math behind these defaults; tune to observed utilization.
    hikari:
      maximum-pool-size: ${HIKARI_MAX_POOL_SIZE:50}
      minimum-idle: ${HIKARI_MIN_IDLE:10}
      # Cap how long a request will wait for a connection from the pool. Set
      # below the FedNow 20-second SLA window so a thread will not block
      # waiting for a connection longer than the rest of the budget allows.
      connection-timeout: ${HIKARI_CONNECTION_TIMEOUT_MS:5000}
      # Recycle connections frequently enough to avoid stale-connection issues
      # with cloud-managed PostgreSQL (RDS, Aurora, Cloud SQL) which idle out
      # at 5–10 minutes.
      idle-timeout: ${HIKARI_IDLE_TIMEOUT_MS:300000}
      max-lifetime: ${HIKARI_MAX_LIFETIME_MS:1500000}
      # Fail fast on a misconfigured pool — Hikari's default is 1 ms which
      # masks real validation failures.
      validation-timeout: ${HIKARI_VALIDATION_TIMEOUT_MS:5000}
  jpa:
    show-sql: false

management:
  endpoints:
    web:
      exposure:
        # health and info only on the public management port.
        # Expose metrics on a separate internal port via management.server.port.
        include: health, info
  endpoint:
    health:
      # Do not expose internal component details to unauthenticated callers.
      show-details: when-authorized
      show-components: when-authorized

# Swagger UI and the raw OpenAPI spec are disabled in production.
# The spec can be generated at build time with springdoc-openapi-maven-plugin
# and distributed to integration partners out-of-band.
springdoc:
  swagger-ui:
    enabled: false
  api-docs:
    enabled: false
