# Test-scope overrides — apply to every test that boots a Spring context.
#
# The main application.yml defaults to PostgreSQL (assuming docker-compose is
# up) so `mvn spring-boot:run` works with no env vars. Tests should not need
# Docker to boot the Spring context: this file swaps the datasource back to
# an H2 in-memory instance in Postgres-compat mode.
#
# @Tag("integration") tests that need real Postgres (see
# AbstractInfrastructureIntegrationTest) declare a @DynamicPropertySource that
# overrides these values at a higher priority — those keep working.
spring.datasource.url=jdbc:h2:mem:test-${random.uuid};MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1
spring.datasource.username=sa
spring.datasource.password=
