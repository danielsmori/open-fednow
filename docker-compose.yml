version: '3.8'

# Local development environment for OpenFedNow
# Starts Redis (Shadow Ledger cache) and RabbitMQ (async message queue)
#
# Usage:
#   docker-compose up -d        # start in background
#   docker-compose down         # stop and remove containers
#   docker-compose logs -f      # follow logs

services:

  redis:
    image: redis:7-alpine
    container_name: openfednow-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: openfednow-rabbitmq
    ports:
      - "5672:5672"    # AMQP
      - "15672:15672"  # Management UI — http://localhost:15672 (guest/guest)
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Kafka (optional) — event streaming bus alongside RabbitMQ.
  # Activate by adding KAFKA_ENABLED=true and KAFKA_BOOTSTRAP_SERVERS=kafka:9092
  # to the openfednow service environment.
  #
  # Uses Bitnami Kafka in KRaft mode (no separate Zookeeper container required).
  kafka:
    image: bitnami/kafka:3.7
    container_name: openfednow-kafka
    ports:
      - "9092:9092"
    environment:
      # KRaft mode — combined controller + broker, no Zookeeper
      - KAFKA_CFG_NODE_ID=0
      - KAFKA_CFG_PROCESS_ROLES=controller,broker
      - KAFKA_CFG_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093
      - KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      - KAFKA_CFG_CONTROLLER_QUORUM_VOTERS=0@kafka:9093
      - KAFKA_CFG_CONTROLLER_LISTENER_NAMES=CONTROLLER
      # Advertised listener — use 'localhost' for host-machine clients,
      # or 'kafka' when connecting from within the docker-compose network
      - KAFKA_CFG_ADVERTISED_LISTENERS=PLAINTEXT://localhost:9092
    volumes:
      - kafka-data:/bitnami/kafka
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics.sh --bootstrap-server localhost:9092 --list"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  redis-data:
  rabbitmq-data:
  kafka-data:
