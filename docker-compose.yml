# Local development environment for OpenFedNow
# Starts Redis (Shadow Ledger cache), RabbitMQ (async message queue), and
# Postgres (durable state: saga_state, idempotency_keys, reconciliation_run,
# admin_audit_log). Postgres is required for the app to accept real traffic
# — the idempotency writes use ON CONFLICT DO NOTHING, which H2 does not
# support even in Postgres-compat mode. The Kafka service is opt-in and
# only relevant when KAFKA_ENABLED=true; it's kept commented out below
# because bitnami/kafka:3.7 was removed from Docker Hub.
#
# Usage:
#   docker-compose up -d        # start in background
#   docker-compose down         # stop and remove containers
#   docker-compose logs -f      # follow logs
#
# Then launch the app with Postgres:
#   DB_URL=jdbc:postgresql://localhost:5432/openfednow \
#   DB_USERNAME=openfednow DB_PASSWORD=openfednow \
#   mvn spring-boot:run

services:

  redis:
    image: redis:7-alpine
    container_name: openfednow-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: openfednow-rabbitmq
    ports:
      - "5672:5672"    # AMQP
      - "15672:15672"  # Management UI — http://localhost:15672 (guest/guest)
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres:
    image: postgres:16-alpine
    container_name: openfednow-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: openfednow
      POSTGRES_USER: openfednow
      POSTGRES_PASSWORD: openfednow
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U openfednow -d openfednow"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Kafka (optional) — event streaming bus alongside RabbitMQ. Only relevant
  # when KAFKA_ENABLED=true in the app. Kept commented out because
  # bitnami/kafka:3.7 was removed from Docker Hub; substitute
  # apache/kafka:3.7.0 (KRaft mode) or confluentinc/cp-kafka when needed.

volumes:
  redis-data:
  rabbitmq-data:
  postgres-data:
